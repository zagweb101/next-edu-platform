# GitHub Actions CI/CD pipeline
# - On PR: lint + typecheck + tests
# - On push to main: deploy to Railway (production)
# - On PR: create Railway preview environment
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN         — Railway API token (https://railway.app/account/tokens)
#   RAILWAY_SERVICE_ID    — Railway service ID for the web service
#   RAILWAY_WORKER_ID     — Railway service ID for the worker service (optional)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "file:/tmp/test.db" # SQLite for CI tests
  AUTH_SECRET: "ci-test-secret-only-32-chars-xxx"
  AUTH_URL: "http://localhost:3000"

jobs:
  lint-and-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Push schema to test DB
        run: bun run db:push

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build Next.js
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy-preview:
    name: Deploy Railway Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy to Railway (preview)
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --environment preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    name: Deploy Railway Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy Web to Railway
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy Worker to Railway
        run: railway up --service "${{ secrets.RAILWAY_WORKER_ID }}" --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true # worker is optional
